<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokoku - Catalog</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-[Fredoka] antialiased min-h-screen flex flex-col">

    <header class="fixed top-0 right-0 z-50 h-16 w-full bg-white border-b border-gray-200 transition-all duration-300 left-0">
        <div class="h-full px-4 max-w-7xl mx-auto flex items-center justify-between gap-4">
            <a href="#dashboard" data-page="dashboard" class="nav-link flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-400 to-blue-500 flex items-center justify-center text-white font-bold text-lg flex-shrink-0">
                    T
                </div>
                <div class="flex flex-col space-y-2 text-gray-700">
                    <span class="text-xl m-0 font-bold text-gray-700">Nama Toko</span>
                    <span class="text-xs m-0">by Tokoku</span>
                </div>
            </a>
            <div class="flex items-center gap-2 ml-auto">
                <a href="login.html" class="font-medium text-blue-500 hover:text-blue-600 transition-colors">Sign in</a>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-20 pb-12 px-4 max-w-7xl mx-auto w-full min-h-screen">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 space-y-4">
            <div class="flex gap-2">
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors" placeholder="Search for products, brands, and categories...">
                </div>
                <button type="button" class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-lg transition-colors shadow-sm">
                    Search
                </button>
            </div>

            <div class="flex items-center gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <button class="px-4 py-1.5 bg-blue-500 text-white text-sm font-medium rounded-full whitespace-nowrap flex-shrink-0">
                    All Category
                </button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium rounded-full whitespace-nowrap flex-shrink-0 transition-colors">
                    Electronics
                </button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium rounded-full whitespace-nowrap flex-shrink-0 transition-colors">
                    Home & Living
                </button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium rounded-full whitespace-nowrap flex-shrink-0 transition-colors">
                    Toys & Gaming
                </button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium rounded-full whitespace-nowrap flex-shrink-0 transition-colors">
                    Automotive
                </button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium rounded-full whitespace-nowrap flex-shrink-0 transition-colors">
                    Fashion
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4">
            
            <a href="#" class="bg-white rounded-md border border-gray-200 hover:border-blue-500 hover:shadow-md transition-all duration-200 flex flex-col group overflow-hidden relative">
                <div class="absolute top-0 right-0 bg-red-100 text-red-600 text-[10px] font-bold px-1.5 py-0.5 z-10">
                    -0%
                </div>
                <div class="aspect-square w-full overflow-hidden bg-gray-100 relative p-2 flex items-center justify-center">
                    <img class="object-cover w-full h-full mix-blend-multiply group-hover:scale-105 transition-transform duration-300">
                </div>
                <div class="p-2.5 flex flex-col flex-grow">
                    <div class="text-xs mb-1 font-medium">
                        <span class="text-gray-800 line-clamp-2 leading-tight">Poster A5</span>
                    </div>
                    <div class="mt-auto pt-2 flex items-center justify-between">
                        <span class="text-blue-500 font-semibold text-sm md:text-base">Rp15.000</span>
                        <span class="text-gray-400 text-xs text-right">28 sold</span>
                    </div>
                </div>
            </a>

            <a href="#" class="bg-white rounded-md border border-gray-200 hover:border-blue-500 hover:shadow-md transition-all duration-200 flex flex-col group overflow-hidden relative">
                <div class="aspect-square w-full overflow-hidden bg-gray-100 relative p-2 flex items-center justify-center">
                    <img class="object-cover w-full h-full mix-blend-multiply group-hover:scale-105 transition-transform duration-300">
                </div>
                <div class="p-2.5 flex flex-col flex-grow">
                    <div class="text-xs mb-1 font-medium">
                        <span class="text-gray-800 line-clamp-2 leading-tight">Keychain</span>
                    </div>
                    <div class="mt-auto pt-2 flex items-center justify-between">
                        <span class="text-blue-500 font-semibold text-sm md:text-base">Rp20.000</span>
                        <span class="text-gray-400 text-xs text-right">100 sold</span>
                    </div>
                </div>
            </a>
        </div>

        <div class="flex justify-center mt-10 space-x-1">
            <button class="px-3 py-1 rounded-md bg-white border border-gray-300 text-gray-500 hover:bg-gray-50">Prev</button>
            <button class="px-3 py-1 rounded-md bg-blue-500 border border-blue-500 text-white font-medium">1</button>
            <button class="px-3 py-1 rounded-md bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 text-blue-500 hover:text-blue-600 transition-colors">2</button>
            <button class="px-3 py-1 rounded-md bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 text-blue-500 hover:text-blue-600 transition-colors">3</button>
            <span class="px-3 py-1 text-gray-500">...</span>
            <button class="px-3 py-1 rounded-md bg-white border border-gray-300 text-gray-500 hover:bg-gray-50">Next</button>
        </div>

    </main>

    <footer class="px-6 py-16 bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto flex gap-16 justify-center text-sm">
            <div class="flex flex-col gap-3">
                <span class="font-bold text-gray-900 mb-1">Product</span>
                <a href="#" class="hover:text-blue-500 transition-colors text-gray-600">Features</a>
                <a href="#" class="hover:text-blue-500 transition-colors text-gray-600">Pricing</a>
                <a href="#" class="hover:text-blue-500 transition-colors text-gray-600">Integrations</a>
            </div>
            <div class="flex flex-col gap-3">
                <span class="font-bold text-gray-900 mb-1">Company</span>
                <a href="#" class="hover:text-blue-500 transition-colors text-gray-600">About Us</a>
                <a href="#" class="hover:text-blue-500 transition-colors text-gray-600">Contact</a>
                <a href="#" class="hover:text-blue-500 transition-colors text-gray-600">Support</a>
            </div>
        </div>
        <div class="max-w-7xl mx-auto mt-12 pt-6 border-t border-gray-100 text-center text-xs text-gray-500">
            © 2026 Tokoku. All rights reserved.
        </div>
    </footer>

</body>
</html>
