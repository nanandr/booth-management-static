    <script>
        // semua halaman htmlnya taro disini
        const pages = {
            'dashboard':            'dashboard.html',
            'booth':                'booth.html',
            'transactions':         'transactions.html',
            'transactions-form':    'transactions/form.html',
            'payment':              'payment.html',
            'products':             'products/index.html',
            'products-form':        'products/form.html',
            'profile':              'profile.html',
            'notifications':        'notifications.html',
        };

        const frame       = document.getElementById('main-frame'); // ambil element <iframe> (main-frame)
        const navLinks    = document.querySelectorAll('.nav-link[data-page]'); // ambil semua elemen nav-link yang ada atribut data-pagenya
        const mobileBtns  = document.querySelectorAll('.mobile-nav-btn[data-page]'); // ini buat mobile nav

        /* LOGS */
        // liat ini di console kalau masih bingung
        console.log(`frame.src currently in frame: ${frame.src}`)
        console.log(`location hash: ${location.hash}`)
        navLinks.forEach((link, i) => {
            console.log(`navlinks ${i}: ${link}`)
        })

        /* function buat bikin text nya biru berdasarkan page yagn aktiv */
        function setActive(page) {
            navLinks.forEach(link => {
                const isActive = link.dataset.page === page;
                link.classList.toggle('text-blue-500', isActive);
                link.classList.toggle('text-gray-700', !isActive);
                link.classList.toggle('bg-blue-50',    isActive);
            });
            mobileBtns.forEach(btn => {
                btn.classList.toggle('text-blue-500', btn.dataset.page === page);
                btn.classList.toggle('text-gray-500', btn.dataset.page !== page);
            });
        }

        // function buat navigasi halaman
        function navigate(page) {
            if (!pages[page]) return;// return nothing kalau ga ada page yang dituju     
            frame.contentWindow.location.replace(pages[page]); // set frame.src jadi page yang dituju
            setActive(page); // set active page jadi page yang dituju
            location.hash = page; // ngeganti '#something' di url jadi halaman yang dituju, misal #profile
        }

        // kasih event listener click buat tiap navlink
        navLinks.forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                navigate(link.dataset.page);
            });
        });

        // button mobile juga
        mobileBtns.forEach(btn => {
            btn.addEventListener('click', () => navigate(btn.dataset.page));
        });

        // function buat handle hash # di URL
        // simpelnya ini function buat ngehandle back button biar user bisa ke halaman sebelumyna
        function handleHash() {
            const page = location.hash.replace('#', '') || 'dashboard'; // 
            navigate(page);
        }

        // kasih evetn litstern hashchange ke window
        window.addEventListener('hashchange', handleHash);
        handleHash();


        // ------------------------------------

        function goToDashboard() {
            location.hash = "#dashboard";
        }
        function goToPage(page) {
            location.hash = `#${page}`;
        }
    </script>
