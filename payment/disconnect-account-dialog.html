<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Manrope:wght@200..800&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: transparent;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Fredoka', sans-serif;
            font-weight: 400;
        }

        body {
            font-family: 'Manrope', sans-serif;
        }


        @keyframes fade-in {
            from {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="w-screen h-screen !bg-[#00000050] grid place-items-center">

    <div class="max-w-[450px] bg-white rounded-2xl shadow-xl">
        <div class="px-5 pt-5 pb-6">
            <div class="flex justify-center gap-2">
                <svg width="68" height="68" fill="#E53E3E" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd"
                        d="M7.345 4.017a42.253 42.253 0 0 1 9.31 0c1.713.192 3.095 1.541 3.296 3.26a40.66 40.66 0 0 1 0 9.445 3.734 3.734 0 0 1-3.296 3.26 42.123 42.123 0 0 1-9.31 0 3.734 3.734 0 0 1-3.296-3.26 40.652 40.652 0 0 1 0-9.444 3.734 3.734 0 0 1 3.295-3.26ZM8.47 8.47a.75.75 0 0 1 1.06 0L12 10.94l2.47-2.47a.75.75 0 1 1 1.06 1.06L13.06 12l2.47 2.47a.75.75 0 0 1-1.06 1.06L12 13.06l-2.47 2.47a.75.75 0 1 1-1.06-1.06L10.94 12 8.47 9.53a.75.75 0 0 1 0-1.06Z"
                        clip-rule="evenodd"></path>
                </svg>
                <img src="../img/dana-logo.svg" width="60">
            </div>
            <div class="text-center mt-3">
                <h3 id="dialog-title" class="text-2xl text-center font-semibold text-gray-800">
                    Disconnect <strong>Dana</strong>?
                </h3>
                <div class="mt-2">
                    <p class="text-lg/[125%]">
                        All your balance will remain intact. You can reconnect your account later.
                    </p>
                </div>
            </div>
        </div>

        <div class="px-5 pt-0 pb-6 sm:flex sm:flex-row-reverse sm:px-6">
            <button onclick="closeDialog()"
                class="inline-flex w-full justify-center rounded-xl bg-[#C53030] px-3 py-2 text-lg font-semibold text-white hover:bg-[#C53030] sm:ml-3 cursor-pointer">
                Disconnect
            </button>
            <button onclick="closeDialog()"
                class="mt-3 inline-flex w-full justify-center rounded-xl bg-white/10 px-3 py-2 text-lg font-semibold border-2 border-blue-500 hover:bg-blue-500 hover:text-white text-blue-500 sm:mt-0 cursor-pointer">
                Cancel
            </button>
        </div>
    </div>

    <script>
        function closeDialog() {
            parent.postMessage({ 'type': 'disconnect-account-dialog-close' });
        }
    </script>
</body>

</html>
