<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="p-4 lg:p-6 min-h-screen">
      <div class="bg-white rounded-lg p-6 md:p-8">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-8">
          Profile
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
          <div class="flex flex-col items-center md:items-start mx-auto">
            <div class="relative">
              <div class="w-48 h-48 bg-gray-300 rounded-lg overflow-hidden">
                <img
                  src="https://images.unsplash.com/photo-1480429370139-e0132c086e2a?q=80&w=688&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                  alt="Profile Avatar"
                  class="w-full h-full object-cover"
                />
              </div>
              <button
                class="absolute bottom-0 right-0 bg-blue-500 hover:bg-blue-700 text-white p-2 rounded-lg transition-colors transform translate-x-1 translate-y-1"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                  ></path>
                  <path
                    d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                  ></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="md:col-span-2">
            <div
              class="grid grid-cols-1 md:grid-cols-3 gap-6 divide-x divide-gray-300"
            >
              <div class="space-y-6 pr-6">
                <div>
                  <label class="block text-gray-600 text-sm font-medium mb-2"
                    >Name</label
                  >
                  <input
                    type="text"
                    placeholder="Johnny Silverhand"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  />
                </div>

                <div>
                  <label class="block text-gray-600 text-sm font-medium mb-2"
                    >Email</label
                  >
                  <input
                    type="email"
                    placeholder="johnnysilverhand@gmail.com"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  />
                </div>
              </div>

              <div class="space-y-6 pr-6">
                <div>
                  <label class="block text-gray-600 text-sm font-medium mb-2"
                    >Reset Password</label
                  >
                  <input
                    type="password"
                    placeholder="••••••••"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  />
                </div>

                <div>
                  <label class="block text-gray-600 text-sm font-medium mb-2"
                    >Confirm Reset Password</label
                  >
                  <input
                    type="password"
                    placeholder="••••••••"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  />
                </div>
              </div>
              <button
                command="show-modal"
                commandfor="dialog"
                class="bg-blue-500 hover:bg-blue-700 text-white px-8 py-2 rounded-lg transition-colors font-medium h-fit cursor-pointer"
              >
                Save
              </button>
              <el-dialog>
                <dialog
                  id="dialog"
                  aria-labelledby="dialog-title"
                  class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent"
                >
                  <el-dialog-backdrop
                    class="fixed inset-0 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in"
                  ></el-dialog-backdrop>

                  <div
                    tabindex="0"
                    class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0"
                  >
                    <el-dialog-panel
                      class="relative transform overflow-hidden rounded-lg bg-gray-800 text-left shadow-xl outline -outline-offset-1 outline-white/10 transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:my-8 sm:w-full sm:max-w-lg data-closed:sm:translate-y-0 data-closed:sm:scale-95"
                    >
                      <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <div class="sm:flex flex-col sm:items-center">
                          <!-- <div
                            class="mx-auto flex size-12 shrink-0 items-center justify-center rounded-full bg-red-500/10 sm:mx-0 sm:size-10"
                          >
                            <svg
                              viewBox="0 0 24 24"
                              fill="none"
                              stroke="currentColor"
                              stroke-width="1.5"
                              data-slot="icon"
                              aria-hidden="true"
                              class="size-6 text-red-400"
                            >
                              <path
                                d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                              />
                            </svg>
                          </div> -->
                          <div
                            class="text-center"
                          >
                            <h3
                              id="dialog-title"
                              class="text-lg text-center font-semibold text-gray-800"
                            >
                              Save Profile?
                            </h3>
                            <div class="mt-2">
                              <p class="text-sm text-gray-400">
                                You can always change this later
                              </p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div
                        class="bg-white px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6"
                      >
                        <button
                          type="button"
                          command="close"
                          commandfor="dialog"
                          class="inline-flex w-full justify-center rounded-md bg-blue-500 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-400 sm:ml-3 cursor-pointer"
                        >
                          Save
                        </button>
                        <button
                          type="button"
                          command="close"
                          commandfor="dialog"
                          class="mt-3 inline-flex w-full justify-center rounded-md bg-white/10 px-3 py-2 text-sm font-semibold border-2 border-blue-500 hover:bg-blue-500 hover:text-white text-blue-500 sm:mt-0 cursor-pointer"
                        >
                          Cancel
                        </button>
                      </div>
                    </el-dialog-panel>
                  </div>
                </dialog>
              </el-dialog>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
