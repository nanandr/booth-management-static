            <p class="text-gray-600">Create an invoice to purchase an item.</p>
        </div>

                        <div class="card flex flex-1 flex-col md:flex-row gap-4 items-center py-2 border-l-3 pl-3 border-blue-500 hover:bg-gray-100 pr-1">
                            <button type="button" onclick="removeCard(this)" class="hover:cursor-pointer ml-auto">

                            </button>
                            <div class="w-full flex-1">
                                <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                                    Product Name *
                                </label>
                                <input list="name" type="text"
                                    placeholder="Enter product name.."
                                    class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    required
                                    value="Poster A5"
                                    >
                                <datalist id="name">
                                    <option value="Poster Asa Mitaka">
                                    <option value="Sticker Jujutsu Kaisen Gojo">
                                    <option value="Keychain Demon Slayer">
                                    <option value="Poster A5">
                                </datalist>
                            </div>
                            <div class="w-full md:w-32">
                                <label for="qty" class="block text-sm font-medium text-gray-700 mb-2">
                                    Qty *
                                </label>
                                <input id="qty" type="number"
                                    placeholder="0" min="0" value="1"
                                    class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    required>
                            </div>
                            <div class="w-full md:w-32">
                                <label for="qty" class="block text-sm font-medium text-gray-700 mb-2">

                        </div>
                        <div class="card flex flex-1 flex-col md:flex-row gap-4 items-center py-2 border-l-3 pl-3 border-blue-500 hover:bg-gray-100 pr-1">

                            </button>
                            <div class="w-full flex-1">
                                <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                                    Product Name *
                                </label>
                                <input list="name" type="text"
                                    placeholder="Enter product name.."
                                    class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    required
                                    value="Keychain"

                                <datalist id="name">
                                    <option value="Poster Asa Mitaka">

                                    placeholder="Enter product name.."
                                    class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    required
                                    >
                                <datalist id="name">

                                    <option value="Sticker Jujutsu Kaisen Gojo">
                                    <option value="Keychain Demon Slayer">
                                    <option value="Poster A5">
                                </datalist>
                            </div>
                            <div class="w-full md:w-32">
                                <label for="qty" class="block text-sm font-medium text-gray-700 mb-2">
                                    Qty *
                                </label>
                                <input id="qty" type="number"
                                    placeholder="0" min="0"
                                    class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    required>
                            </div>
                            <div class="w-full md:w-32">
                                <label for="qty" class="block text-sm font-medium text-gray-700 mb-2">

                                <input id="price" type="number"
                                    placeholder="Rp" min="0"
                                    class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"

            <div class="space-y-6">
                <div class="card bg-white p-6 rounded-lg shadow transition-all duration-200 space-y-4">

                    <div class="space-y-2">
                        <div class="flex items-center justify-between text-sm">
                            <span class="text-gray-600">Created:</span>

                            <span id="created-date" class="text-gray-700 font-medium">4 April 2026</span>
                        </div>
                        <div class="flex items-center justify-between text-sm font-semibold text-gray-700">
                            <span>Items:</span>
                        </div>
                        <div class="flex items-center justify-between text-sm text-gray-600">
                            <span>Poster A5</span>
                            <span class="font-medium">Rp10.000</span>
                        </div>
                        <div class="flex items-center justify-between text-sm text-gray-600">
                            <span>Keychain</span>
                            <span class="font-medium">Rp20.000</span>
                        </div>
                        <div class="flex items-center justify-between font-semibold mt-4">
                            <span class="text-gray-600">Total:</span>
                            <span class="text-xl text-blue-500">Rp30.000</span>
                        </div>
                    </div>
                </div>
                <div class="card bg-white p-6 rounded-lg shadow transition-all duration-200 space-y-4">
                    <div>
                        <label for="method" class="block text-sm font-medium text-gray-700 mb-2">Payment Method *</label>
                        <select id="method" class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option disabled selected>Choose payment method</option>
                            <option value="cash">Cash</option>
                            <option value="qris">QRIS</option>
                            <option value="bank">Bank Transfer</option>
                        </select>
                    </div>
                </div>
                <div class="card bg-white p-6 rounded-lg shadow transition-all duration-200 space-y-4">
                    <a onclick="parent.postMessage({ 'type': 'page', 'to': 'transactions-payment' }, '*')">
                        <button type="button" class="flex items-center justify-center space-x-2 w-full h-full p-2 bg-blue-500 hover:bg-blue-700 text-white rounded-lg transition-colors fill-current">

                        </button>
                    </a>
                    <button type="button" class="flex mt-4 items-center justify-center space-x-2 w-full h-full p-2 border-blue-500 border-2 text-blue-500 hover:bg-blue-700 text-blue-500 hover:text-white rounded-lg transition-colors fill-current">
                        <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8.46967 8.46966C8.76256 8.17677 9.23744 8.17677 9.53033 8.46966L12 10.9393L14.4697 8.46967C14.7626 8.17678 15.2374 8.17678 15.5303 8.46967C15.8232 8.76256 15.8232 9.23744 15.5303 9.53033L13.0607 12L15.5303 14.4697C15.8232 14.7626 15.8232 15.2374 15.5303 15.5303C15.2374 15.8232 14.7626 15.8232 14.4697 15.5303L12 13.0607L9.53034 15.5303C9.23744 15.8232 8.76257 15.8232 8.46968 15.5303C8.17678 15.2374 8.17678 14.7626 8.46968 14.4697L10.9393 12L8.46967 9.53032C8.17678 9.23743 8.17678 8.76255 8.46967 8.46966Z"/><path fill-rule="evenodd" clip-rule="evenodd" d="M7.31673 3.76876C10.4043 3.42368 13.5957 3.42368 16.6832 3.76876C18.5096 3.97288 19.9845 5.41153 20.1994 7.24849C20.5686 10.4054 20.5686 13.5946 20.1994 16.7515C19.9845 18.5885 18.5096 20.0271 16.6832 20.2313C13.5957 20.5763 10.4043 20.5763 7.31673 20.2313C5.49035 20.0271 4.01545 18.5885 3.8006 16.7515C3.43137 13.5946 3.43137 10.4054 3.8006 7.24849C4.01545 5.41153 5.49035 3.97288 7.31673 3.76876ZM16.5166 5.25948C13.5398 4.92677 10.4602 4.92677 7.48334 5.25948C6.33891 5.38738 5.42286 6.29063 5.29045 7.42274C4.93476 10.4639 4.93476 13.5361 5.29045 16.5773C5.42286 17.7094 6.33891 18.6126 7.48334 18.7405C10.4602 19.0732 13.5398 19.0732 16.5166 18.7405C17.6611 18.6126 18.5771 17.7094 18.7095 16.5773C19.0652 13.5361 19.0652 10.4639 18.7095 7.42274C18.5771 6.29063 17.6611 5.38738 16.5166 5.25948Z"/></svg>

</body>
<script>
    const addItem = document.getElementById("add-item")
    const item = document.getElementById("item");
    const cart = document.getElementById("cart");
    
    function removeCard(btn) {
    btn.closest('.card').remove();
    }

    addItem.addEventListener('click', () => {
        const clone = item.cloneNode(true);
        cart.appendChild(clone);
    });
</script>
</html>
