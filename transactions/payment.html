<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="p-4 lg:p-6 font-['Manrope']">
        <nav class="flex items-center space-x-2 text-sm mb-6">
            <a onclick="parent.postMessage({ 'type': 'dashboard' }, '*')" class="flex items-center text-gray-700 hover:text-blue-500 hover:cursor-pointer fill-current">
                <svg width="24" height="24" viewBox="0 0 32 24" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M13.5578 5.53423C12.6873 4.69887 11.3127 4.69887 10.4422 5.53423L5.81574 9.97357C5.70239 10.0823 5.62614 10.224 5.5978 10.3785C5.04367 13.4004 5.00277 16.494 5.47681 19.5295L5.58933 20.25H8.56579V14.0387C8.56579 13.6244 8.90158 13.2887 9.31579 13.2887H14.6842C15.0984 13.2887 15.4342 13.6244 15.4342 14.0387V20.25H18.4107L18.5232 19.5295C18.9972 16.494 18.9563 13.4004 18.4022 10.3785C18.3739 10.224 18.2976 10.0823 18.1843 9.97357L13.5578 5.53423ZM9.40363 4.45191C10.8546 3.05965 13.1454 3.05965 14.5964 4.45191L19.2228 8.89125C19.5634 9.21804 19.7925 9.64373 19.8776 10.108C20.4621 13.2956 20.5053 16.559 20.0052 19.7609L19.8245 20.9184C19.7497 21.3971 19.3374 21.75 18.8529 21.75H14.6842C14.27 21.75 13.9342 21.4142 13.9342 21V14.7887H10.0658V21C10.0658 21.4142 9.73 21.75 9.31579 21.75H5.14706C4.66258 21.75 4.25029 21.3971 4.17554 20.9184L3.99478 19.7609C3.49473 16.559 3.53788 13.2956 4.12241 10.108C4.20754 9.64373 4.43662 9.21804 4.77719 8.89125L9.40363 4.45191Z"/></svg>    
            </a>
            <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M9.96967 7.46967C10.2626 7.17678 10.7374 7.17678 11.0303 7.46967L15.0303 11.4697C15.3232 11.7626 15.3232 12.2374 15.0303 12.5303L11.0303 16.5303C10.7374 16.8232 10.2626 16.8232 9.96967 16.5303C9.67678 16.2374 9.67678 15.7626 9.96967 15.4697L13.4393 12L9.96967 8.53033C9.67678 8.23744 9.67678 7.76256 9.96967 7.46967Z"/></svg>
            <a onclick="parent.postMessage({ 'type': 'page', 'to': 'transactions' }, '*')" class="flex items-center text-gray-700 hover:text-blue-500 hover:cursor-pointer">Transactions</a>
            <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M9.96967 7.46967C10.2626 7.17678 10.7374 7.17678 11.0303 7.46967L15.0303 11.4697C15.3232 11.7626 15.3232 12.2374 15.0303 12.5303L11.0303 16.5303C10.7374 16.8232 10.2626 16.8232 9.96967 16.5303C9.67678 16.2374 9.67678 15.7626 9.96967 15.4697L13.4393 12L9.96967 8.53033C9.67678 8.23744 9.67678 7.76256 9.96967 7.46967Z"/></svg>
            <a href="" class="flex items-center text-gray-700 hover:text-blue-500">Create Invoice</a>
        </nav>
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-gray-700 mb-2">Payment</h1>
            <p class="text-gray-600">Ask customer to complete the payment.</p>
        </div>
        <form class="grid grid-cols-1 gap-6" action="" method="post" enctype="multipart/form-data">
            <div class="space-y-6">
                <div class="card bg-white p-6 rounded-lg shadow transition-all duration-200 flex flex-col items-center space-y-4">
                    <div class="w-full text-left">
                        <h3 class="text-sm font-medium text-gray-700">Scan to Pay</h3>
                        <p class="text-xs text-gray-500 mt-1">Scan with any supported e-wallet or banking app</p>
                    </div>
                    <div class="p-3 bg-white border border-gray-200 rounded-xl shadow-sm inline-block">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=TokakuBoothDummyTransaction" alt="QRIS Barcode" class="w-40 h-40 object-contain" />
                    </div>
                </div>
                <div class="card text-red-500 bg-white p-6 rounded-lg shadow transition-all duration-200 space-y-4">
                    <div class="space-y-2">
                        <div class="flex items-center justify-between text-sm">
                            <span>Expires in:</span>
                            <span id="timer" class="font-medium">05:00</span>
                        </div>
                    </div>
                </div>
                <div class="card bg-white p-6 rounded-lg shadow transition-all duration-200 space-y-4">
                    <h2 class="text-lg font-semibold text-gray-700">Summary</h2>
                    <div class="space-y-2">
                        <div class="flex items-center justify-between text-sm">
                            <span class="text-gray-600">Created:</span>
                            <span id="created-date" class="text-gray-700 font-medium">5 April 2026</span>
                        </div>
                        <div class="flex items-center justify-between text-sm font-semibold text-gray-700">
                            <span>Items:</span>
                        </div>
                        <div class="flex items-center justify-between text-sm text-gray-600">
                            <span>Poster A5</span>
                            <span class="font-medium">Rp10.000</span>
                        </div>
                        <div class="flex items-center justify-between text-sm text-gray-600">
                            <span>Keychain</span>
                            <span class="font-medium">Rp20.000</span>
                        </div>
                        <div class="flex items-center justify-between font-semibold mt-4">
                            <span class="text-gray-600">Total:</span>
                            <span class="text-xl text-blue-500">Rp30.000</span>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>
<script>
    let duration = 5 * 60;
    const display = document.getElementById("timer");

    const timer = setInterval(() => {
    let minutes = Math.floor(duration / 60);
    let seconds = duration % 60;

    minutes = String(minutes).padStart(2, "0");
    seconds = String(seconds).padStart(2, "0");

    display.textContent = `${minutes}:${seconds}`;

    if (duration <= 0) {
        clearInterval(timer);
        display.textContent = "00:00";
    }

    duration--;
    }, 1000);
</script>
</html>
